<!--
  ╔══════════════════════════════════════════════════════════╗
  ║        SOCIA VISUAL — EMAIL SIGNATURE                    ║
  ║        Apple Mail + Gmail compatible                     ║
  ║                                                          ║
  ║  HOW TO INSTALL IN APPLE MAIL                            ║
  ║  1. Open Mail → Settings → Signatures                    ║
  ║  2. Click + to create a new signature, name it anything  ║
  ║  3. Close Mail completely (Cmd+Q)                        ║
  ║  4. In Finder: Go → Go to Folder →                       ║
  ║       ~/Library/Mail/V10/MailData/Signatures/            ║
  ║  5. Sort by Date Modified — open the newest .mailsig     ║
  ║     file in TextEdit                                      ║
  ║  6. Select all, delete everything                        ║
  ║  7. Paste the full contents of this file                 ║
  ║  8. Save, reopen Mail — done.                            ║
  ╚══════════════════════════════════════════════════════════╝
-->
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="color-scheme" content="dark light">
<meta name="supported-color-schemes" content="dark light">
<style>
  :root { color-scheme: dark light; }

  /* Animations — Apple Mail renders these; Gmail ignores them gracefully */
  @-webkit-keyframes svBarPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes svBarPulse          { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  #socia-sig .sv-topbar { -webkit-animation: svBarPulse 3s ease-in-out infinite; animation: svBarPulse 3s ease-in-out infinite; }

  @-webkit-keyframes svFlicker { 0%,94%,96%,98%,100% { opacity:1; } 95% { opacity:0.4; } 97% { opacity:0.8; } 99% { opacity:0.5; } }
  @keyframes svFlicker           { 0%,94%,96%,98%,100% { opacity:1; } 95% { opacity:0.4; } 97% { opacity:0.8; } 99% { opacity:0.5; } }
  #socia-sig .sv-title { -webkit-animation: svFlicker 10s ease-in-out infinite 3s; animation: svFlicker 10s ease-in-out infinite 3s; }

  @-webkit-keyframes svShimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  @keyframes svShimmer           { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  #socia-sig .sv-tagline {
    background: linear-gradient(90deg, #1c1c1c 0%, #A8FF00 50%, #1c1c1c 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-animation: svShimmer 30s linear infinite;
    animation: svShimmer 30s linear infinite;
  }

  /* Hover states */
  #socia-sig a.sv-cval:hover { color: #A8FF00 !important; }
  #socia-sig a.sv-soc:hover  { color: #A8FF00 !important; }
  #socia-sig a.sv-soc:hover svg { fill: #A8FF00 !important; }
</style>
