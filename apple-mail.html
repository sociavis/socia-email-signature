<!--
  ╔══════════════════════════════════════════════════════════╗
  ║        SOCIA VISUAL — APPLE MAIL SIGNATURE               ║
  ║        Supports dark + light mode via prefers-color-scheme
  ║                                                          ║
  ║  HOW TO INSTALL IN APPLE MAIL                            ║
  ║  1. Open Mail → Settings → Signatures                    ║
  ║  2. Click + to create a new signature, name it anything  ║
  ║  3. Close Mail completely (Cmd+Q)                        ║
  ║  4. In Finder: Go → Go to Folder →                       ║
  ║       ~/Library/Mail/V10/MailData/Signatures/            ║
  ║     (folder may be V9 or V11 depending on Mail version)  ║
  ║  5. Sort by Date Modified — open the newest .mailsig     ║
  ║     file in TextEdit                                      ║
  ║  6. Select all, delete everything                        ║
  ║  7. Paste the full contents of this file                 ║
  ║  8. Save, reopen Mail — done.                            ║
  ╚══════════════════════════════════════════════════════════╝
-->
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="color-scheme" content="dark light">
<meta name="supported-color-schemes" content="dark light">
<style>
  /* Tell the renderer to follow OS dark/light preference — prevents white override */
  :root { color-scheme: dark light; }

  /* All other rules scoped to #socia-sig — zero bleed into email body */

  #socia-sig .sig {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
  }

  #socia-sig .sig-topbar {
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #A8FF00 35%, #D4FF00 65%, transparent 100%);
    -webkit-animation: svBarPulse 3s ease-in-out infinite;
    animation: svBarPulse 3s ease-in-out infinite;
  }
  @-webkit-keyframes svBarPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes svBarPulse          { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  #socia-sig .sig-scan {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(168,255,0,0.013) 3px, rgba(168,255,0,0.013) 4px);
    pointer-events: none;
    z-index: 10;
  }

  #socia-sig .corner {
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: #A8FF00;
    border-style: solid;
    opacity: 0;
    z-index: 11;
    -webkit-animation: svCornersIn 0.6s ease forwards;
    animation: svCornersIn 0.6s ease forwards;
  }
  #socia-sig .c-tl { top: 6px;    left: 6px;   border-width: 1px 0 0 1px; -webkit-animation-delay:.1s; animation-delay:.1s; }
  #socia-sig .c-tr { top: 6px;    right: 6px;  border-width: 1px 1px 0 0; -webkit-animation-delay:.2s; animation-delay:.2s; }
  #socia-sig .c-bl { bottom: 6px; left: 6px;   border-width: 0 0 1px 1px; -webkit-animation-delay:.3s; animation-delay:.3s; }
  #socia-sig .c-br { bottom: 6px; right: 6px;  border-width: 0 1px 1px 0; -webkit-animation-delay:.4s; animation-delay:.4s; }
  @-webkit-keyframes svCornersIn { to { opacity: 0.5; } }
  @keyframes svCornersIn          { to { opacity: 0.5; } }

  #socia-sig .sig-body {
    padding: 10px 18px 10px;
    position: relative;
    z-index: 1;
  }
  #socia-sig .sig-row {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    gap: 16px;
  }

  #socia-sig .logo-mark { -webkit-flex-shrink: 0; flex-shrink: 0; width: 96px; height: 96px; }
  #socia-sig .logo-gif  { width: 96px; height: 96px; display: block; }

  #socia-sig .vdivider {
    width: 1px;
    height: 96px;
    background: linear-gradient(180deg, transparent, #A8FF00 40%, #D4FF00 60%, transparent);
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    opacity: 0;
    -webkit-animation: svFadeIn 0.8s ease forwards 0.5s;
    animation: svFadeIn 0.8s ease forwards 0.5s;
  }
  @-webkit-keyframes svFadeIn { to { opacity: 0.4; } }
  @keyframes svFadeIn          { to { opacity: 0.4; } }

  #socia-sig .sig-info { -webkit-flex: 1; flex: 1; min-width: 0; }

  @-webkit-keyframes svSlideIn { to { opacity: 1; -webkit-transform: none; transform: none; } }
  @keyframes svSlideIn          { to { opacity: 1; transform: none; } }

  #socia-sig .sig-name,
  #socia-sig .sig-title,
  #socia-sig .contact-row {
    opacity: 0;
    -webkit-transform: translateX(6px);
    transform: translateX(6px);
    -webkit-animation: svSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation: svSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  #socia-sig .sig-name                 { -webkit-animation-delay: 0.3s;  animation-delay: 0.3s; }
  #socia-sig .sig-title                { -webkit-animation-delay: 0.55s; animation-delay: 0.55s; }
  #socia-sig .contact-row:nth-child(1) { -webkit-animation-delay: 0.75s; animation-delay: 0.75s; }
  #socia-sig .contact-row:nth-child(2) { -webkit-animation-delay: 0.95s; animation-delay: 0.95s; }

  #socia-sig .sig-name {
    font-family: 'Chakra Petch', monospace, sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  #socia-sig .sig-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #A8FF00;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
    -webkit-animation: svSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.55s, svFlicker 10s ease-in-out infinite 3s;
    animation: svSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.55s, svFlicker 10s ease-in-out infinite 3s;
  }
  @-webkit-keyframes svFlicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95% { opacity: 0.4; } 97% { opacity: 0.8; } 99% { opacity: 0.5; }
  }
  @keyframes svFlicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95% { opacity: 0.4; } 97% { opacity: 0.8; } 99% { opacity: 0.5; }
  }

  #socia-sig .sig-contacts { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 3px; }
  #socia-sig .contact-row  { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 9px; }

  #socia-sig .contact-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7.5px;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    width: 24px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }

  #socia-sig .contact-val {
    font-family: 'Chakra Petch', monospace, sans-serif;
    font-size: 10.5px;
    color: #888;
    letter-spacing: 0.03em;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #socia-sig .contact-val:hover { color: #A8FF00; }

  #socia-sig .sig-footer {
    padding: 4px 18px 16px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  #socia-sig .sig-tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #1c1c1c 0%, #A8FF00 50%, #1c1c1c 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-animation: svShimmer 30s linear infinite;
    animation: svShimmer 30s linear infinite;
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  @-webkit-keyframes svShimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  @keyframes svShimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }

  #socia-sig .sig-socials {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    gap: 16px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    min-width: 0;
  }

  #socia-sig .soc-link {
    display: inline-flex;
    align-items: center;
    color: #555555;
    text-decoration: none;
    -webkit-transition: color 0.25s ease;
    transition: color 0.25s ease;
  }
  #socia-sig .soc-link svg { width: 14px; height: 14px; display: block; }
  #socia-sig .soc-link:hover { color: #A8FF00; }

  #socia-sig .sig-bottombar {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #A8FF00 50%, transparent 100%);
    opacity: 0;
    -webkit-animation: svFadeIn 1.2s ease forwards 0.8s;
    animation: svFadeIn 1.2s ease forwards 0.8s;
  }

  @media (prefers-color-scheme: light) {
    #socia-sig .sig-topbar { background: linear-gradient(90deg, transparent 0%, #5a8800 35%, #7ab000 65%, transparent 100%); }
    #socia-sig .corner { border-color: #5a8800; }
    #socia-sig .vdivider { background: linear-gradient(180deg, transparent, #999 40%, #bbb 60%, transparent); }
    #socia-sig .sig-name  { color: #0f0f0f; }
    #socia-sig .sig-title { color: #3d6200; }
    #socia-sig .contact-tag { color: #888; }
    #socia-sig .contact-val { color: #222; }
    #socia-sig .contact-val:hover { color: #3d6200; }
    #socia-sig .sig-tagline  {
      background: linear-gradient(90deg, #888 0%, #3d6200 50%, #888 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #socia-sig .soc-link { color: #666; }
    #socia-sig .soc-link:hover { color: #3d6200; }
  }

  @media (max-width: 480px) {
    #socia-sig .sig-body   { padding: 10px 12px 10px; }
    #socia-sig .sig-footer { padding: 6px 12px 9px; -webkit-flex-direction: column; flex-direction: column; -webkit-align-items: flex-start; align-items: flex-start; gap: 8px; }
    #socia-sig .sig-name   { font-size: 13px; }
    #socia-sig .sig-title  { font-size: 8px; }
    #socia-sig .contact-val { font-size: 9.5px; }
    #socia-sig .logo-mark { width: 72px; height: 72px; }
    #socia-sig .logo-gif  { width: 72px; height: 72px; }
    #socia-sig .vdivider  { height: 76px; }
    #socia-sig .sig-row   { gap: 14px; }
    #socia-sig .sig-tagline {
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: unset;
      background-clip: unset;
      color: #444444;
      -webkit-animation: none;
      animation: none;
    }
  }

  @media (max-width: 480px) and (prefers-color-scheme: light) {
    #socia-sig .sig-tagline { color: #777777; }
  }
</style>
