<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<meta name="color-scheme" content="dark light">
<meta name="supported-color-schemes" content="dark light">
<style>
  :root { color-scheme: dark light; }

  #sv-b .card {
    width: 100%;
    max-width: 100%;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
  }

  #sv-b .card-topbar {
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #A8FF00 30%, #D4FF00 70%, transparent 100%);
    -webkit-animation: bBarPulse 3s ease-in-out infinite;
    animation: bBarPulse 3s ease-in-out infinite;
  }
  @-webkit-keyframes bBarPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes bBarPulse          { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  #sv-b .card-scan {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(168,255,0,0.01) 3px, rgba(168,255,0,0.01) 4px);
    pointer-events: none;
    z-index: 10;
  }

  #sv-b .card-main {
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    padding: 14px 20px;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  #sv-b .logo-wrap {
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    margin-right: 18px;
  }
  #sv-b .logo-wrap img { width: 80px; height: 80px; display: block; }

  #sv-b .vdiv {
    width: 1px;
    height: 72px;
    background: linear-gradient(180deg, transparent, #A8FF00 40%, #D4FF00 60%, transparent);
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    opacity: 0;
    margin: 0 18px;
    -webkit-animation: bFadeIn 0.8s ease forwards 0.4s;
    animation: bFadeIn 0.8s ease forwards 0.4s;
  }
  @-webkit-keyframes bFadeIn { to { opacity: 0.35; } }
  @keyframes bFadeIn          { to { opacity: 0.35; } }

  #sv-b .sig-ident {
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }

  #sv-b .sig-contacts {
    -webkit-flex: 1;
    flex: 1;
    min-width: 0;
  }

  @-webkit-keyframes bSlideIn { to { opacity: 1; -webkit-transform: none; transform: none; } }
  @keyframes bSlideIn          { to { opacity: 1; transform: none; } }

  #sv-b .sig-name,
  #sv-b .sig-title,
  #sv-b .contact-row {
    opacity: 0;
    -webkit-transform: translateX(6px);
    transform: translateX(6px);
    -webkit-animation: bSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation: bSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  #sv-b .sig-name                 { -webkit-animation-delay: 0.25s; animation-delay: 0.25s; }
  #sv-b .sig-title                { -webkit-animation-delay: 0.45s; animation-delay: 0.45s; }
  #sv-b .contact-row:nth-child(1) { -webkit-animation-delay: 0.6s;  animation-delay: 0.6s; }
  #sv-b .contact-row:nth-child(2) { -webkit-animation-delay: 0.75s; animation-delay: 0.75s; }

  #sv-b .sig-name {
    font-family: 'Chakra Petch', monospace, sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 4px;
    white-space: nowrap;
  }

  #sv-b .sig-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8.5px;
    color: #A8FF00;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0;
    -webkit-animation: bSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.45s, bFlicker 10s ease-in-out infinite 3s;
    animation: bSlideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.45s, bFlicker 10s ease-in-out infinite 3s;
  }
  @-webkit-keyframes bFlicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95% { opacity: 0.4; } 97% { opacity: 0.8; } 99% { opacity: 0.5; }
  }
  @keyframes bFlicker {
    0%, 94%, 96%, 98%, 100% { opacity: 1; }
    95% { opacity: 0.4; } 97% { opacity: 0.8; } 99% { opacity: 0.5; }
  }

  #sv-b .sig-contacts { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 4px; }
  #sv-b .contact-row  { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 9px; }

  #sv-b .contact-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    color: #333;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    width: 24px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }

  #sv-b .contact-val {
    font-family: 'Chakra Petch', monospace, sans-serif;
    font-size: 10px;
    color: #777;
    letter-spacing: 0.03em;
    text-decoration: none;
    white-space: nowrap;
  }
  #sv-b .contact-val:hover { color: #A8FF00; }

  #sv-b .sig-socials {
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-align-items: center;
    align-items: center;
    gap: 10px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    margin-left: 18px;
    padding-left: 18px;
    border-left: 1px solid #1a1a1a;
    opacity: 0;
    -webkit-animation: bFadeIn 0.8s ease forwards 0.9s;
    animation: bFadeIn 0.8s ease forwards 0.9s;
  }

  #sv-b .soc-link {
    display: inline-flex;
    -webkit-align-items: center;
    align-items: center;
    color: #444;
    text-decoration: none;
    -webkit-transition: color 0.25s ease;
    transition: color 0.25s ease;
  }
  #sv-b .soc-link svg { width: 13px; height: 13px; display: block; }
  #sv-b .soc-link:hover { color: #A8FF00; }

  /* ── Tagline strip ── */
  #sv-b .card-strip {
    border-top: 1px solid #141414;
    padding: 7px 20px 14px;
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  #sv-b .card-strip::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,255,0,0.15) 50%, transparent);
  }

  #sv-b .sig-tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #222 0%, #A8FF00 50%, #222 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-animation: bShimmer 30s linear infinite;
    animation: bShimmer 30s linear infinite;
    white-space: nowrap;
  }
  @-webkit-keyframes bShimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  @keyframes bShimmer          { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

  #sv-b .card-bottombar {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #A8FF00 50%, transparent 100%);
    opacity: 0;
    -webkit-animation: bFadeIn 1.2s ease forwards 0.8s;
    animation: bFadeIn 1.2s ease forwards 0.8s;
  }

  /* ── Light mode ── */
  @media (prefers-color-scheme: light) {
    #sv-b .card-topbar    { background: linear-gradient(90deg, transparent 0%, #5a8800 30%, #7ab000 70%, transparent 100%); }
    #sv-b .sig-name       { color: #0f0f0f; }
    #sv-b .sig-title      { color: #3d6200; }
    #sv-b .contact-tag    { color: #aaa; }
    #sv-b .contact-val    { color: #333; }
    #sv-b .contact-val:hover { color: #3d6200; }
    #sv-b .vdiv           { background: linear-gradient(180deg, transparent, #999 40%, #bbb 60%, transparent); }
    #sv-b .sig-socials    { border-color: #ddd; }
    #sv-b .soc-link       { color: #888; }
    #sv-b .soc-link:hover { color: #3d6200; }
    #sv-b .card-strip     { border-color: #e0e0e0; }
    #sv-b .sig-tagline    {
      background: linear-gradient(90deg, #bbb 0%, #3d6200 50%, #bbb 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  }
</style>
